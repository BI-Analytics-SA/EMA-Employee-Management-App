# Netlify configuration for Employee Management App

[build]
  # Build command
  command = "npm run build"
  # Output directory (Vite default)
  publish = "dist"

# Environment variables (set these in Netlify dashboard, not here)
# VITE_CONVEX_URL = your-convex-deployment-url
# VITE_CONVEX_SITE_URL = your-convex-site-url

# SPA redirect - all routes go to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
