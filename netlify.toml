# Netlify configuration for Employee Management App

[build]
  # Build command
  command = "npm run build"
  # Output directory (Vite default)
  publish = "dist"
  # Skip auto-build on push to main so the release workflow can run first;
  # production deploys are triggered by the workflow via build hook (see .github/workflows/release.yml).
  # Build-hook builds are not affected by this ignore (Netlify still runs them).
  ignore = "test \"$BRANCH\" = main && exit 0 || exit 1"

# Environment variables (set these in Netlify dashboard, not here)
# VITE_CONVEX_URL = your-convex-deployment-url
# VITE_CONVEX_SITE_URL = your-convex-site-url

# Serve version.json as static file (must come before SPA catch-all)
[[redirects]]
  from = "/version.json"
  to = "/version.json"
  status = 200

# SPA redirect - all routes go to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html -- always revalidate so users get latest entry point
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

# Service worker -- always revalidate so browser detects new builds
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# Version manifest -- never cache so version check always gets current value
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-store"
